<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Winter Login</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Nunito', sans-serif;
    min-height: 100vh;
    overflow: hidden;
    background: #1a1040;
  }

  /* ── Scene ── */
  .scene {
    position: relative;
    width: 100vw;
    height: 100vh;
    background: linear-gradient(180deg,
      #2d1b69 0%,
      #6b2fa0 30%,
      #9b4bc8 55%,
      #b06ad4 65%,
      #c8a0dc 78%,
      #d4b8e0 85%,
      #e8d5f0 92%,
      #f0e8f8 100%
    );
  }

  /* Mountains */
  .mountains {
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 60%;
  }

  .mountain {
    position: absolute;
    bottom: 0;
    width: 0;
    height: 0;
  }

  .m1 {
    border-left: 280px solid transparent;
    border-right: 250px solid transparent;
    border-bottom: 420px solid #3d2080;
    left: -80px;
  }
  .m2 {
    border-left: 220px solid transparent;
    border-right: 200px solid transparent;
    border-bottom: 370px solid #4a2a90;
    left: 160px;
  }
  .m3 {
    border-left: 300px solid transparent;
    border-right: 280px solid transparent;
    border-bottom: 480px solid #2e1a78;
    right: -100px;
  }
  .m4 {
    border-left: 240px solid transparent;
    border-right: 220px solid transparent;
    border-bottom: 400px solid #3a2288;
    right: 120px;
  }
  .m5 {
    border-left: 180px solid transparent;
    border-right: 180px solid transparent;
    border-bottom: 320px solid #2a1870;
    left: 50%;
    transform: translateX(-50%);
  }

  /* Snow ground */
  .ground {
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 22%;
    background: linear-gradient(180deg, #d8c8f0 0%, #e8d8f8 40%, #f0eafc 100%);
    border-radius: 80% 80% 0 0 / 30% 30% 0 0;
  }

  /* Trees */
  .trees {
    position: absolute;
    bottom: 18%;
    width: 100%;
  }

  .tree {
    position: absolute;
    bottom: 0;
  }

  .tree-top {
    width: 0;
    height: 0;
    border-left: solid transparent;
    border-right: solid transparent;
    border-bottom: solid;
    margin: 0 auto;
  }

  .tree-trunk {
    background: #2a1a50;
    margin: 0 auto;
    width: 8px;
    height: 18px;
  }

  .tree-1 { left: 3%; }
  .tree-1 .tree-top { border-left-width: 35px; border-right-width: 35px; border-bottom: 100px solid #1e3a5f; }
  .tree-2 { left: 8%; }
  .tree-2 .tree-top { border-left-width: 28px; border-right-width: 28px; border-bottom: 80px solid #253a60; }
  .tree-3 { left: 13%; }
  .tree-3 .tree-top { border-left-width: 22px; border-right-width: 22px; border-bottom: 65px solid #1a3050; }

  .tree-4 { right: 3%; }
  .tree-4 .tree-top { border-left-width: 35px; border-right-width: 35px; border-bottom: 100px solid #1e3a5f; }
  .tree-5 { right: 8%; }
  .tree-5 .tree-top { border-left-width: 28px; border-right-width: 28px; border-bottom: 80px solid #253a60; }
  .tree-6 { right: 13%; }
  .tree-6 .tree-top { border-left-width: 22px; border-right-width: 22px; border-bottom: 65px solid #1a3050; }

  /* Cabin */
  .cabin {
    position: absolute;
    bottom: 20%;
    right: 8%;
    width: 90px;
  }

  .cabin-roof {
    width: 0;
    height: 0;
    border-left: 55px solid transparent;
    border-right: 55px solid transparent;
    border-bottom: 55px solid #3a2080;
    margin: 0 auto;
    position: relative;
  }

  .cabin-roof::after {
    content: '';
    position: absolute;
    top: 8px;
    left: -50px;
    width: 0;
    height: 0;
    border-left: 50px solid transparent;
    border-right: 50px solid transparent;
    border-bottom: 12px solid rgba(255,255,255,0.25);
  }

  .cabin-body {
    background: #2a1860;
    height: 42px;
    width: 80px;
    margin: 0 auto;
    position: relative;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .cabin-window {
    width: 22px;
    height: 16px;
    background: radial-gradient(ellipse, #ffdd88 0%, #ffaa33 60%, #ff8800 100%);
    border-radius: 3px;
    box-shadow: 0 0 12px 6px rgba(255,180,50,0.5), 0 0 25px 10px rgba(255,150,30,0.3);
    animation: flicker 3s ease-in-out infinite;
  }

  @keyframes flicker {
    0%,100% { opacity: 1; box-shadow: 0 0 12px 6px rgba(255,180,50,0.5), 0 0 25px 10px rgba(255,150,30,0.3); }
    50% { opacity: 0.85; box-shadow: 0 0 8px 4px rgba(255,180,50,0.4), 0 0 18px 8px rgba(255,150,30,0.25); }
  }

  /* Smoke */
  .chimney {
    position: absolute;
    top: -65px;
    right: 12px;
    width: 10px;
    height: 20px;
    background: #2a1860;
  }

  .smoke {
    position: absolute;
    top: -70px;
    right: 10px;
  }

  .smoke-puff {
    position: absolute;
    border-radius: 50%;
    background: rgba(255,255,255,0.18);
    animation: rise 4s ease-out infinite;
  }

  .smoke-puff:nth-child(1) { width: 14px; height: 14px; animation-delay: 0s; }
  .smoke-puff:nth-child(2) { width: 20px; height: 20px; animation-delay: 1.3s; }
  .smoke-puff:nth-child(3) { width: 16px; height: 16px; animation-delay: 2.6s; }

  @keyframes rise {
    0% { transform: translateY(0) translateX(0) scale(1); opacity: 0.6; }
    100% { transform: translateY(-60px) translateX(10px) scale(2.5); opacity: 0; }
  }

  /* Clouds */
  .clouds { position: absolute; top: 8%; width: 100%; }

  .cloud {
    position: absolute;
    border-radius: 50px;
    background: rgba(200,150,230,0.35);
    animation: drift linear infinite;
  }

  .cloud::before, .cloud::after {
    content: '';
    position: absolute;
    border-radius: 50%;
    background: inherit;
  }

  .cloud-1 { width: 80px; height: 22px; top: 0; left: -100px; animation-duration: 35s; }
  .cloud-1::before { width: 45px; height: 35px; top: -18px; left: 10px; }
  .cloud-1::after { width: 35px; height: 28px; top: -12px; left: 30px; }

  .cloud-2 { width: 60px; height: 18px; top: 40px; left: -80px; animation-duration: 28s; animation-delay: -15s; background: rgba(200,150,230,0.25); }
  .cloud-2::before { width: 35px; height: 28px; top: -14px; left: 8px; }
  .cloud-2::after { width: 28px; height: 22px; top: -9px; left: 22px; }

  .cloud-3 { width: 100px; height: 26px; top: 20px; left: -130px; animation-duration: 42s; animation-delay: -8s; }
  .cloud-3::before { width: 55px; height: 42px; top: -22px; left: 15px; }
  .cloud-3::after { width: 40px; height: 32px; top: -16px; left: 40px; }

  @keyframes drift {
    from { transform: translateX(0); }
    to { transform: translateX(120vw); }
  }

  /* Snow canvas */
  #snowCanvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
  }

  /* ── Login Card ── */
  .card-wrapper {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 10;
  }

  .card {
    background: rgba(120, 60, 180, 0.35);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 24px;
    padding: 44px 48px;
    width: 380px;
    box-shadow: 0 8px 60px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.2);
    animation: cardIn 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) both;
  }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(30px) scale(0.95); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  .card h1 {
    text-align: center;
    color: #fff;
    font-size: 2rem;
    font-weight: 800;
    margin-bottom: 36px;
    letter-spacing: -0.5px;
  }

  .field {
    margin-bottom: 28px;
    position: relative;
  }

  .field label {
    display: block;
    color: rgba(255,255,255,0.9);
    font-size: 0.95rem;
    font-weight: 700;
    margin-bottom: 8px;
  }

  .field input {
    width: 100%;
    background: transparent;
    border: none;
    border-bottom: 2px solid rgba(255,255,255,0.4);
    padding: 8px 0;
    color: #fff;
    font-family: 'Nunito', sans-serif;
    font-size: 1rem;
    outline: none;
    transition: border-color 0.3s;
  }

  .field input::placeholder { color: rgba(255,255,255,0.35); }

  .field input:focus { border-bottom-color: rgba(255,255,255,0.9); }

  .field-line {
    position: absolute;
    bottom: 0;
    left: 0;
    height: 2px;
    width: 0;
    background: #fff;
    transition: width 0.3s;
  }

  .field input:focus ~ .field-line { width: 100%; }

  .row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 28px;
  }

  .remember {
    display: flex;
    align-items: center;
    gap: 8px;
    color: rgba(255,255,255,0.85);
    font-size: 0.88rem;
    font-weight: 600;
    cursor: pointer;
  }

  .remember input[type="checkbox"] {
    width: 15px;
    height: 15px;
    accent-color: #fff;
  }

  .forgot {
    color: #fff;
    font-size: 0.88rem;
    font-weight: 800;
    text-decoration: none;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .forgot:hover { opacity: 0.7; }

  .btn-login {
    width: 100%;
    padding: 14px;
    background: #fff;
    color: #3a1a70;
    font-family: 'Nunito', sans-serif;
    font-size: 1.05rem;
    font-weight: 800;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    position: relative;
    overflow: hidden;
  }

  .btn-login:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 25px rgba(0,0,0,0.3);
  }

  .btn-login:active { transform: translateY(0); }

  .btn-login .spinner {
    display: none;
    width: 18px;
    height: 18px;
    border: 3px solid rgba(58,26,112,0.3);
    border-top-color: #3a1a70;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin: 0 auto;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .btn-login.loading .btn-text { display: none; }
  .btn-login.loading .spinner { display: block; }

  .register {
    text-align: center;
    margin-top: 22px;
    color: rgba(255,255,255,0.75);
    font-size: 0.88rem;
  }

  .register a {
    color: #fff;
    font-weight: 800;
    text-decoration: none;
    cursor: pointer;
  }
  .register a:hover { text-decoration: underline; }

  /* Toast */
  .toast {
    position: fixed;
    top: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(-80px);
    background: rgba(30,10,60,0.95);
    color: #fff;
    padding: 14px 28px;
    border-radius: 50px;
    font-weight: 700;
    font-size: 0.95rem;
    border: 1px solid rgba(255,255,255,0.15);
    transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    z-index: 100;
    white-space: nowrap;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.success { border-color: rgba(100,255,150,0.4); }
  .toast.error { border-color: rgba(255,100,100,0.4); }

  .error-msg {
    color: rgba(255,150,150,0.9);
    font-size: 0.8rem;
    margin-top: 5px;
    display: none;
  }

  .error-msg.visible { display: block; }

  /* Forgot modal */
  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 50;
    justify-content: center;
    align-items: center;
    backdrop-filter: blur(4px);
  }

  .overlay.show { display: flex; }

  .modal {
    background: rgba(80, 30, 140, 0.9);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 20px;
    padding: 36px;
    width: 340px;
    color: #fff;
    animation: cardIn 0.4s ease both;
  }

  .modal h2 { font-size: 1.4rem; font-weight: 800; margin-bottom: 10px; }
  .modal p { color: rgba(255,255,255,0.7); font-size: 0.9rem; margin-bottom: 24px; }

  .modal-close {
    display: flex;
    justify-content: flex-end;
    gap: 12px;
    margin-top: 20px;
  }

  .btn-sm {
    padding: 10px 24px;
    border-radius: 50px;
    border: none;
    font-family: 'Nunito', sans-serif;
    font-weight: 700;
    font-size: 0.9rem;
    cursor: pointer;
    transition: opacity 0.2s;
  }

  .btn-sm:hover { opacity: 0.8; }
  .btn-sm.outline { background: transparent; color: #fff; border: 1px solid rgba(255,255,255,0.4); }
  .btn-sm.primary { background: #fff; color: #3a1a70; }
</style>
</head>
<body>

<div class="scene">
  <!-- Clouds -->
  <div class="clouds">
    <div class="cloud cloud-1"></div>
    <div class="cloud cloud-2"></div>
    <div class="cloud cloud-3"></div>
  </div>

  <!-- Mountains -->
  <div class="mountains">
    <div class="mountain m1"></div>
    <div class="mountain m2"></div>
    <div class="mountain m3"></div>
    <div class="mountain m4"></div>
    <div class="mountain m5"></div>
  </div>

  <!-- Trees -->
  <div class="trees">
    <div class="tree tree-1"><div class="tree-top"></div><div class="tree-trunk"></div></div>
    <div class="tree tree-2"><div class="tree-top"></div><div class="tree-trunk"></div></div>
    <div class="tree tree-3"><div class="tree-top"></div><div class="tree-trunk"></div></div>
    <div class="tree tree-4"><div class="tree-top"></div><div class="tree-trunk"></div></div>
    <div class="tree tree-5"><div class="tree-top"></div><div class="tree-trunk"></div></div>
    <div class="tree tree-6"><div class="tree-top"></div><div class="tree-trunk"></div></div>
  </div>

  <!-- Cabin -->
  <div class="cabin">
    <div class="cabin-roof">
      <div class="chimney"></div>
      <div class="smoke">
        <div class="smoke-puff"></div>
        <div class="smoke-puff"></div>
        <div class="smoke-puff"></div>
      </div>
    </div>
    <div class="cabin-body">
      <div class="cabin-window"></div>
    </div>
  </div>

  <!-- Ground -->
  <div class="ground"></div>

  <!-- Snow Canvas -->
  <canvas id="snowCanvas"></canvas>

  <!-- Login Card -->
  <div class="card-wrapper">
    <div class="card">
      <h1>Login</h1>

      <div class="field">
        <label>Email</label>
        <input type="email" id="email" placeholder="Enter your email">
        <div class="field-line"></div>
        <div class="error-msg" id="emailError">Please enter a valid email.</div>
      </div>

      <div class="field">
        <label>Password</label>
        <input type="password" id="password" placeholder="Enter your password">
        <div class="field-line"></div>
        <div class="error-msg" id="passError">Password must be at least 6 characters.</div>
      </div>

      <div class="row">
        <label class="remember">
          <input type="checkbox" id="remember"> Remember Me
        </label>
        <span class="forgot" onclick="openForgot()">Forget Password</span>
      </div>

      <button class="btn-login" id="loginBtn" onclick="handleLogin()">
        <span class="btn-text">Log in</span>
        <div class="spinner"></div>
      </button>

      <div class="register">Don't have an account? <a onclick="openRegister()">Register</a></div>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Forgot Password Modal -->
<div class="overlay" id="forgotOverlay">
  <div class="modal">
    <h2>Forgot Password?</h2>
    <p>Enter your email and we'll send you a reset link.</p>
    <div class="field">
      <label>Email</label>
      <input type="email" id="resetEmail" placeholder="your@email.com">
      <div class="field-line"></div>
    </div>
    <div class="modal-close">
      <button class="btn-sm outline" onclick="closeForgot()">Cancel</button>
      <button class="btn-sm primary" onclick="sendReset()">Send Link</button>
    </div>
  </div>
</div>

<script>
// ── Snow ──────────────────────────────────────────────
const canvas = document.getElementById('snowCanvas');
const ctx = canvas.getContext('2d');

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

const flakes = [];
const NUM = 180;

for (let i = 0; i < NUM; i++) {
  flakes.push({
    x: Math.random() * window.innerWidth,
    y: Math.random() * window.innerHeight,
    r: Math.random() * 3.5 + 0.5,
    speed: Math.random() * 1.2 + 0.3,
    drift: Math.random() * 0.6 - 0.3,
    opacity: Math.random() * 0.6 + 0.3,
    wobble: Math.random() * Math.PI * 2,
    wobbleSpeed: Math.random() * 0.02 + 0.005
  });
}

function drawSnow() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  flakes.forEach(f => {
    f.wobble += f.wobbleSpeed;
    f.x += f.drift + Math.sin(f.wobble) * 0.4;
    f.y += f.speed;

    if (f.y > canvas.height + 10) {
      f.y = -10;
      f.x = Math.random() * canvas.width;
    }
    if (f.x > canvas.width + 10) f.x = -10;
    if (f.x < -10) f.x = canvas.width + 10;

    ctx.beginPath();
    ctx.arc(f.x, f.y, f.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,255,255,${f.opacity})`;
    ctx.fill();
  });
  requestAnimationFrame(drawSnow);
}
drawSnow();

// ── Auth Backend Simulation ────────────────────────────
const USERS_DB = {
  'demo@winter.com': { password: 'snow123', name: 'Winter User' },
  'admin@winter.com': { password: 'admin123', name: 'Admin' }
};

// Session storage simulation
let currentSession = null;

function showToast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast ${type} show`;
  setTimeout(() => { t.className = `toast ${type}`; }, 3500);
}

function validateEmail(e) { return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e); }

function setLoading(state) {
  const btn = document.getElementById('loginBtn');
  btn.classList.toggle('loading', state);
  btn.disabled = state;
}

function simulateBackend(email, password) {
  return new Promise((resolve, reject) => {
    setTimeout(() => {
      const user = USERS_DB[email.toLowerCase()];
      if (!user) return reject({ field: 'email', msg: 'No account found with this email.' });
      if (user.password !== password) return reject({ field: 'pass', msg: 'Incorrect password.' });
      resolve({ token: btoa(`${email}:${Date.now()}`), name: user.name });
    }, 1500);
  });
}

function handleLogin() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const remember = document.getElementById('remember').checked;

  // Clear errors
  document.getElementById('emailError').className = 'error-msg';
  document.getElementById('passError').className = 'error-msg';

  let valid = true;
  if (!validateEmail(email)) {
    document.getElementById('emailError').className = 'error-msg visible';
    valid = false;
  }
  if (password.length < 6) {
    document.getElementById('passError').className = 'error-msg visible';
    valid = false;
  }
  if (!valid) return;

  setLoading(true);

  simulateBackend(email, password)
    .then(res => {
      currentSession = { token: res.token, name: res.name };
      if (remember) localStorage.setItem('winterSession', JSON.stringify(currentSession));
      showToast(`❄️ Welcome back, ${res.name}!`, 'success');
      setTimeout(() => {
        document.querySelector('.card h1').textContent = '✓ Logged In';
        document.querySelector('.card').style.pointerEvents = 'none';
      }, 1000);
    })
    .catch(err => {
      if (err.field === 'email') document.getElementById('emailError').textContent = err.msg, document.getElementById('emailError').className = 'error-msg visible';
      else document.getElementById('passError').textContent = err.msg, document.getElementById('passError').className = 'error-msg visible';
      showToast('❌ Login failed. Please check your credentials.', 'error');
    })
    .finally(() => setLoading(false));
}

// Enter key support
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') handleLogin();
});

function openForgot() {
  document.getElementById('forgotOverlay').classList.add('show');
}

function closeForgot() {
  document.getElementById('forgotOverlay').classList.remove('show');
}

function sendReset() {
  const email = document.getElementById('resetEmail').value.trim();
  if (!validateEmail(email)) { showToast('Please enter a valid email.', 'error'); return; }
  closeForgot();
  showToast(`📧 Reset link sent to ${email}`, 'success');
}

function openRegister() {
  showToast('📝 Registration coming soon!', '');
}

// Check for saved session
const saved = localStorage.getItem('winterSession');
if (saved) {
  currentSession = JSON.parse(saved);
  document.getElementById('email').value = atob(currentSession.token).split(':')[0];
}
</script>
</body>
</html>
